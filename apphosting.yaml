# Firebase App Hosting configuration
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  cpu: 1
  memoryMiB: 512
  concurrency: 80
  maxInstances: 1
  minInstances: 1
  timeoutSeconds: 3600

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: social-web-tv.firebaseapp.com
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: social-web-tv
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: social-web-tv.firebasestorage.app
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "245780247646"
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: NEXT_PUBLIC_FIREBASE_APP_ID
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
    availability:
      - RUNTIME
  - variable: ADMIN_OPS_EMAILS
    value: sa@socialtv.com
  - variable: ADMIN_ALLOWED_EMAILS
    value: sa@socialtv.com
  - variable: ADMIN_EDITOR_EMAILS
    value: ""
  - variable: ADMIN_VIEWER_EMAILS
    value: ""
  - variable: NEXT_PUBLIC_APP_URL
    value: https://socialtv--social-web-tv.europe-west4.hosted.app
